# Copy to workspace.yaml (or generated by scripts/setup.sh)
# Paths can be absolute or relative to this file's directory.
# spring_repo is typically spring-<basename> where <basename> is the Play repo directory name.

play_repo: /path/to/<play-repo>
spring_repo: /path/to/spring-<basename>
migration_root: /path/to/workspace-dir
batch_size: 25
base_package: com.example.application
# Set by scripts/setup.sh: absolute path to <play_repo>/.cursor (config/, docs/, skills/)
# kit_path: /path/to/<play-repo>/.cursor
